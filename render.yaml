services:
  - type: web
    name: finedu-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    repositoryUrl: https://github.com/sanuk238/FinEdu
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
